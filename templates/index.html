<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-coins"></i>
                </div>
                <h1>{{ system_name }}</h1>
            </div>
            <p class="subtitle">实时同步 · 安全可靠 · 极速查询</p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 16px;">
                <a href="/dashboard" class="admin-btn" style="text-decoration: none; display: inline-flex; align-items: center;">
                    <i class="fas fa-chart-line"></i> 数据看板
                </a>
                <button class="admin-btn" onclick="showImportModal()">
                    <i class="fas fa-upload"></i> 管理员导入
                </button>
            </div>
        </header>

        <!-- 导入弹窗 -->
        <div id="importModal" class="modal hidden">
            <div class="modal-overlay" onclick="hideImportModal()"></div>
            <div class="modal-content glass">
                <div class="modal-header">
                    <h3><i class="fas fa-file-import"></i> 导入数据</h3>
                    <button class="modal-close" onclick="hideImportModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="import-instructions">
                        <h4><i class="fas fa-info-circle"></i> 导入说明</h4>
                        <ol>
                            <li>打开腾讯文档在线表格</li>
                            <li>点击右上角「...」→「导出为CSV」</li>
                            <li>选择导出的文件上传到下方</li>
                        </ol>
                        <p class="format-hint">
                            <i class="fas fa-table"></i> 表格格式要求：第1列=手机号，第2列=通宝奖励
                        </p>
                    </div>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".csv,.txt" style="display:none" onchange="handleFileSelect(event)">
                        <div class="upload-content" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>点击选择CSV文件</p>
                            <span>或将文件拖拽到此处</span>
                        </div>
                        <div id="fileInfo" class="file-info hidden">
                            <i class="fas fa-file-csv"></i>
                            <span id="fileName"></span>
                            <button onclick="clearFile()"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div id="importResult" class="import-result hidden"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="hideImportModal()">取消</button>
                    <button class="btn-primary" id="importBtn" onclick="doImport()" disabled>
                        <i class="fas fa-upload"></i> 开始导入
                    </button>
                </div>
            </div>
        </div>

        <!-- 搜索卡片 -->
        <div class="search-card glass">
            <div class="search-wrapper">
                <div class="input-group">
                    <i class="fas fa-mobile-alt input-icon"></i>
                    <input
                        type="tel"
                        id="phoneInput"
                        placeholder="请输入11位手机号"
                        maxlength="11"
                        autocomplete="off"
                    >
                    <button id="searchBtn" class="search-btn" onclick="doQuery()">
                        <i class="fas fa-search"></i>
                        <span>查询</span>
                    </button>
                </div>
                <div id="inputHint" class="input-hint"></div>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在查询中...</p>
        </div>

        <!-- 结果区域 -->
        <div id="resultArea" class="result-area hidden">
            <!-- 汇总卡片 -->
            <div class="summary-cards">
                <div class="summary-card glass">
                    <div class="card-icon icon-total">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">累计通宝</span>
                        <span class="card-value" id="totalReward">0</span>
                    </div>
                </div>
                <div class="summary-card glass">
                    <div class="card-icon icon-days">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">记录天数</span>
                        <span class="card-value" id="totalDays">0</span>
                    </div>
                </div>
                <div class="summary-card glass">
                    <div class="card-icon icon-avg">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="card-content">
                        <span class="card-label">日均通宝</span>
                        <span class="card-value" id="avgReward">0</span>
                    </div>
                </div>
            </div>

            <!-- 明细表格 -->
            <div class="detail-card glass">
                <div class="card-header">
                    <h3><i class="fas fa-list-alt"></i> 每日明细</h3>
                    <span class="phone-tag" id="phoneTag"></span>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th><i class="fas fa-hashtag"></i> 序号</th>
                                <th><i class="fas fa-calendar"></i> 日期</th>
                                <th><i class="fas fa-coins"></i> 通宝奖励</th>
                            </tr>
                        </thead>
                        <tbody id="detailBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">
                <i class="fas fa-search"></i>
            </div>
            <h3>未找到记录</h3>
            <p>请确认手机号是否正确，或联系管理员确认数据是否已同步</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorToast" class="error-toast hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorMsg"></span>
        </div>

        <!-- 底部统计 -->
        <footer class="footer glass">
            <div class="footer-stats">
                <span><i class="fas fa-users"></i> 查询用户: <strong id="statUsers">0</strong></span>
                <span><i class="fas fa-database"></i> 总记录: <strong id="statRecords">0</strong></span>
                <span><i class="fas fa-sync-alt"></i> 最后同步: <strong id="statSync">--</strong></span>
            </div>
            <p class="copyright">Powered by 通宝奖励查询系统 v1.0</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
